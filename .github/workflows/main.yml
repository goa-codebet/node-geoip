name: Auto Update

on: 
  workflow_dispatch: 
  schedule:
    - cron: "0 0 * * WED"

jobs:
  run:
    name: UpdateDB and publish
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v1
      with:
        node-version: 12.x
        registry-url: https://registry.npmjs.org/

    - name: Install dependencies
      run: npm install

    - name: UpdateDB
      run: npm run-script updatedb
      env:
        LICENSE_KEY: ${{secrets.maxmind_token}}

    - name: Add, Commit & Push
      run: |
        git commit -am "UpdateIPDB"
        git push

    - name: Bump Version & Push
      run: |
        git config --global user.email "autoupdate@codebet.com"
        git config --global user.name "AutoUpdate"
        npm version patch
        git push

    - name: Npm publish
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{secrets.npm_token}}
